<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Suitcase outline -->
  <rect x="40" y="60" width="120" height="90" rx="15" fill="none" stroke="#1f4e79" stroke-width="6"></rect>
  
  <!-- Handle -->
  <rect x="75" y="40" width="50" height="25" rx="8" fill="none" stroke="#1f4e79" stroke-width="6"></rect>

  <!-- Buildings -->
  <rect x="70" y="90" width="20" height="40" fill="#1f4e79"></rect>
  <rect x="110" y="90" width="20" height="40" fill="#1f4e79"></rect>
  
  <!-- Center hotel -->
  <rect x="85" y="75" width="30" height="55" fill="#ff7a00"></rect>

  <!-- Windows -->
  <rect x="90" y="85" width="5" height="5" fill="white"></rect>
  <rect x="100" y="85" width="5" height="5" fill="white"></rect>
  <rect x="90" y="95" width="5" height="5" fill="white"></rect>
  <rect x="100" y="95" width="5" height="5" fill="white"></rect>

  <!-- Star -->
  <polygon points="100,60 104,70 115,70 106,77 110,88 100,82 90,88 94,77 85,70 96,70" fill="#ff7a00"></polygon>

  <!-- Location pin -->
  <circle cx="100" cy="130" r="12" fill="white" stroke="#1f4e79" stroke-width="4"></circle>
  <polygon points="100,150 88,130 112,130" fill="#1f4e79"></polygon>

  <!-- Checkmark -->
  <polyline points="94,130 99,135 108,125" fill="none" stroke="#ff7a00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>

</svg>